name: Build Windows Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            runner: windows-latest
            python_arch: x86
          - arch: x64
            runner: windows-latest
            python_arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PFC_ARCH: ${{ matrix.arch }}
      PFC_SKIP_EXE_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python_arch }}

      - name: Install Dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build EXE
        shell: cmd
        run: build_exe.bat

      - name: Rename EXE
        shell: powershell
        run: Copy-Item dist/ProjectFileCompare.exe "dist/ProjectFileCompare-${{ matrix.arch }}.exe"

      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: ProjectFileCompare-exe-${{ matrix.arch }}
          path: dist/ProjectFileCompare-${{ matrix.arch }}.exe
          if-no-files-found: error

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build Installer
        shell: cmd
        run: build_installer.bat

      - name: Upload Installer
        uses: actions/upload-artifact@v7
        with:
          name: ProjectFileCompare-installer-${{ matrix.arch }}
          path: |
            Output/ProjectFileCompare-Setup-${{ matrix.arch }}.exe
            installer/Output/ProjectFileCompare-Setup-${{ matrix.arch }}.exe
          if-no-files-found: error
