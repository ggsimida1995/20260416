<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project File Compare</title>
  <style>
/*__APP_CSS__*/
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="card topbar-card">
      <div class="title-row">
        <div class="title-block">
          <h1 class="headline" id="appTitle">Hollysys 批处理</h1>
          <p class="subline" id="appSubtitle">下载 / 比现代 / 清理</p>
        </div>
        <span class="status-pill idle" id="statusBadge">待执行</span>
      </div>
      <div class="toolbar">
        <button class="action-button action-primary" id="startButton">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          <div class="action-text-group">
            <span class="action-label" id="startButtonLabel">开始批处理</span>
            <span class="action-detail" id="startButtonDetail">下载 / 比对 / 清理</span>
          </div>
        </button>
        <button class="action-button" id="downloadButton">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          仅下载资料
        </button>
        <button class="action-button" id="compareButton">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
          仅本地比对
        </button>
        <button class="utility-button" id="openDirButton">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          打开目录
        </button>
        <button class="utility-button" id="refreshSessionButton">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          刷新会话
        </button>
        <button class="utility-button" id="settingsButton">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          设置
        </button>
      </div>
      <div class="busy-strip hidden" id="busyStrip" aria-live="polite">
        <div class="busy-strip-head">
          <span class="busy-strip-title" id="busyTitle">正在后台检测环境和会话</span>
          <span class="busy-strip-detail" id="busyDetail">页面已打开，请稍候几秒</span>
        </div>
        <div class="busy-strip-bar">
          <span class="busy-strip-progress"></span>
        </div>
      </div>
    </section>

    <section class="card output-card">
      <div class="card-padding">
        <div class="output-head">
          <h2 class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            输出结果
          </h2>
          <span class="output-meta" id="outputMeta">尚未生成比对结果</span>
        </div>
        <div class="output-grid">
          <div class="output-panel">
            <div class="output-panel-head">
              <span class="output-label">成功台账</span>
              <span class="status-pill idle" id="successWorkbookBadge">未生成</span>
            </div>
            <div class="output-path" id="successWorkbookPath">暂无文件</div>
            <div class="output-actions">
              <button class="utility-button utility-button-compact" id="openSuccessWorkbookButton">打开文件</button>
              <button class="utility-button utility-button-compact" id="openSuccessWorkbookDirButton">打开目录</button>
            </div>
          </div>
          <div class="output-panel">
            <div class="output-panel-head">
              <span class="output-label">失败报告</span>
              <span class="status-pill idle" id="errorReportBadge">0 个</span>
            </div>
            <div class="output-list empty" id="errorReportList">暂无失败 txt</div>
            <div class="output-actions">
              <button class="utility-button utility-button-compact" id="openFirstErrorReportButton">打开首个</button>
              <button class="utility-button utility-button-compact" id="openErrorDirButton">打开目录</button>
            </div>
          </div>
          <div class="output-panel">
            <div class="output-panel-head">
              <span class="output-label">运行日志</span>
              <span class="status-pill idle" id="logFileBadge">未生成</span>
            </div>
            <div class="output-path" id="logFilePath">暂无日志文件</div>
            <div class="output-actions">
              <button class="utility-button utility-button-compact" id="openLogFileButton">打开文件</button>
              <button class="utility-button utility-button-compact" id="openLogDirButton">打开目录</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <article class="card log-card">
      <div class="card-padding" style="display:flex; flex-direction:column; height:100%;">
        <div class="log-head">
          <h2 class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            运行日志
          </h2>
          <button class="utility-button utility-button-compact" id="clearLogsButton">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            清空日志
          </button>
        </div>
        <div class="log-body" id="logOutput">
          <span class="log-placeholder">运行日志会显示在这里。</span>
        </div>
      </div>
    </article>
  </div>

  <div class="modal-mask" id="settingsModal">
    <div class="card modal">
      <div class="card-padding">
        <div class="modal-head">
          <h2 class="modal-title">设置</h2>
          <button class="utility-button utility-button-compact" id="closeSettingsButton">关闭</button>
        </div>

        <div class="settings-grid" style="margin-top: 24px;">
          <section class="settings-section">
            <div class="section-title">基础设置</div>
            <div class="form-grid">
              <div class="form-row">
                <label class="form-label" for="fileRootInput">保存目录</label>
                <input type="text" id="fileRootInput" />
                <button class="utility-button" id="chooseDirButton" type="button">选择</button>
                <button class="utility-button" id="openDirInlineButton" type="button">打开</button>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <div class="section-title">识别设置</div>
            <label class="checkbox-row">
              <input type="checkbox" id="aiEnabledInput" />
              <span>启用在线识别（优先 AI，未配置时再 OCR）</span>
            </label>
            <div class="form-grid">
              <div class="form-row">
                <label class="form-label" for="aiBaseUrlInput">AI 接口</label>
                <input type="text" id="aiBaseUrlInput" />
              </div>
              <div class="form-row">
                <label class="form-label" for="aiApiKeyInput">AI Key</label>
                <input type="password" id="aiApiKeyInput" />
              </div>
              <div class="form-row">
                <label class="form-label" for="aiModelInput">AI 模型</label>
                <input type="text" id="aiModelInput" />
              </div>
              <div class="form-row">
                <label class="form-label" for="ocrBaseUrlInput">OCR 接口</label>
                <input type="text" id="ocrBaseUrlInput" />
              </div>
              <div class="form-row">
                <label class="form-label" for="ocrApiKeyInput">OCR Key</label>
                <input type="password" id="ocrApiKeyInput" />
              </div>
              <div class="form-row">
                <label class="form-label" for="requestTimeoutInput">超时(秒)</label>
                <input type="number" id="requestTimeoutInput" min="1" max="300" />
              </div>
              <div class="form-row">
                <label class="form-label" for="imageMaxKbInput">图片上限(KB)</label>
                <input type="number" id="imageMaxKbInput" min="20" max="1024" />
              </div>
            </div>
          </section>
        </div>

        <div class="modal-actions">
          <button class="utility-button" id="cancelSettingsButton">取消</button>
          <button class="action-button action-primary" id="saveSettingsButton">保存设置</button>
        </div>
      </div>
    </div>
  </div>

  <script>
/*__APP_JS__*/
  </script>
</body>
</html>
